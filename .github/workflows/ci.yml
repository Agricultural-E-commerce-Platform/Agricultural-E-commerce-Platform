name: CI

on:
  # dev 브랜치 PR 생성/업데이트 시 빌드 & 테스트 실행
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 소스 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # Java 17 환경 설정
      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle 의존성 캐싱 (빌드 속도 향상)
      - name: Gradle 캐싱
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # gradlew 실행 권한 부여
      - name: Gradle 권한 설정
        run: chmod +x gradlew

      # 테스트 제외 빌드 (테스트는 별도로 실행 예정)
      - name: Gradle 빌드
        run: ./gradlew build -x test

      # main 브랜치일 때만 Docker Hub 로그인
      - name: Docker Hub 로그인
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # main 브랜치 머지 시에만 Docker 이미지 빌드 & Docker Hub 푸시
      - name: Docker 이미지 빌드 & 푸시
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/agri-commerce:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/agri-commerce:latest