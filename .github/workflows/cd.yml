name: CD

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["CI"]   # CI 워크플로우 완료 후 실행
    types:
      - completed
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}  # CI 성공 시에만 배포

    steps:
      # SSH로 서버 접속 & 배포
      - name: SSH로 서버 접속 & 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/team1
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d
            
            # 애플리케이션 기동을 위해 초기 10초 대기
            sleep 10
            
            # 최대 20회(30초) 동안 1.5초 간격으로 헬스체크 재시도 - 10초(초기 대기) + 20회 * 1.5초 = 총 40초
            for i in $(seq 1 20); do
              HTTP_CODE=$(curl -sS -o /tmp/health_response.txt -w "%{http_code}" --max-time 5 http://localhost:8080/actuator/health)
              
              if [ "$HTTP_CODE" -eq 200 ]; then
                echo "✅ Health check passed!"
                exit 0
              fi
            
              # 200이 아닌 경우 상세 로그 출력 후 다음 루프로 즉시 이동
              echo "❌ Health check failed with HTTP $HTTP_CODE (attempt $i/20)"
              cat /tmp/health_response.txt
              sleep 1.5
            done
            
            # 20회 재시도 후에도 성공하지 못한 경우
            echo "🚨 Health check failed after 20 retries."
            cat /tmp/health_response.txt
            exit 1
