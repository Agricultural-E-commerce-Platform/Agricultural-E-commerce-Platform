jwt:
  secret:
    key: your-base64-encoded-secret-key

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/DB-name
    username: root
    password: your-DB-password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # 개발 환경 기준
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  #  Redis 설정
  data:
    redis:
      host: localhost
      port: 6379
