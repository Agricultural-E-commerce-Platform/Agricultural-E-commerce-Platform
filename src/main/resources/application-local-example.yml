jwt:
  secret:
    key: your_jwt_secret_here

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/DB 이름
    username: your_db_username
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # 개발 환경 기준
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  #  Redis 설정
  data:
    redis:
      host: localhost
      port: 6379
