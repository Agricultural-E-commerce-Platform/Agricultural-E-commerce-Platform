jwt:
  secret:
    key: your_jwt_secret_here

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: your_db_username
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # 운영은 절대 update 금지
    properties:
      hibernate:
        show_sql: false
        format_sql: false

  #  Redis 설정
  data:
    redis:
      host: localhost
      port: 6379
